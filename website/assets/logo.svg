<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Icon: Browser window with sparkle -->
  <g>
    <!-- Browser frame -->
    <rect x="4" y="8" width="32" height="32" rx="4" stroke="#1a56db" stroke-width="2" fill="none"/>
    <!-- Browser bar -->
    <line x1="4" y1="16" x2="36" y2="16" stroke="#1a56db" stroke-width="1.5" opacity="0.4"/>
    <!-- Browser dots -->
    <circle cx="10" cy="12" r="1.2" fill="#1a56db" opacity="0.5"/>
    <circle cx="15" cy="12" r="1.2" fill="#1a56db" opacity="0.5"/>
    <circle cx="20" cy="12" r="1.2" fill="#1a56db" opacity="0.5"/>
    <!-- Sparkle/Polish effect -->
    <g transform="translate(28, 10)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#1a56db" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#1a56db" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#1a56db" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#1a56db" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <!-- Code lines inside browser -->
    <line x1="10" y1="22" x2="24" y2="22" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <line x1="10" y1="26" x2="30" y2="26" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    <line x1="10" y1="30" x2="20" y2="30" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
    <line x1="10" y1="34" x2="26" y2="34" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  </g>
  <!-- Wordmark -->
  <text x="46" y="32" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#1a1a1a">website</text>
  <text x="152" y="32" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="400" letter-spacing="-0.5" fill="#6b6b6b">polierer</text>
</svg>